<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Pinard app</title>
        <style>
            :root {
                --page-bg: #ffffff;
                --ink: #1c2735;
                --muted: #5d6a79;
                --bubble: #fffbea;
                --review-text: #000000;
                --bubble-shadow: rgba(16, 36, 56, 0.23);
                --gold: #f2bb05;
            }

            @media (prefers-color-scheme: dark) {
                :root {
                    --page-bg: #000000;
                    --ink: #f3efe4;
                    --muted: #ddd5c2;
                    --bubble: #2e2a1b;
                    --review-text: #ffffff;
                }
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    "Helvetica Neue", Arial, sans-serif;
                background: var(--page-bg);
                color: var(--ink);
            }

            main {
                width: min(760px, 92vw);
                padding: 52px 20px 44px;
                text-align: center;
            }

            .app-icon {
                width: min(42vw, 240px);
                max-width: 240px;
                height: auto;
                display: block;
                margin: 0 auto;
                filter: drop-shadow(0 18px 24px rgba(15, 29, 45, 0.28));
            }

            h1 {
                margin: 22px 0 10px;
                font-size: clamp(2rem, 6vw, 3.25rem);
                letter-spacing: 0.02em;
            }

            .tagline {
                margin: 0;
                font-size: clamp(1rem, 2.8vw, 1.2rem);
                color: var(--muted);
            }

            .store-link {
                margin: 26px auto 0;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                line-height: 0;
            }

            .store-badge {
                height: 54px;
                width: auto;
                display: block;
            }

            .carousel-wrap {
                margin-top: 28px;
                display: flex;
                justify-content: center;
            }

            .review-bubble {
                position: relative;
                width: min(560px, 100%);
                min-height: 136px;
                border-radius: 28px;
                background: var(--bubble);
                box-shadow: 0 14px 26px -14px var(--bubble-shadow);
                padding: 18px 22px 26px;
                text-align: left;
                transition:
                    opacity 260ms ease,
                    transform 260ms ease;
            }

            .review-bubble::after {
                content: "";
                position: absolute;
                left: 46px;
                bottom: -18px;
                width: 22px;
                height: 18px;
                background: var(--bubble);
                clip-path: polygon(50% 100%, 0 0, 100% 0);
            }

            .review-bubble.entering {
                opacity: 0;
                transform: translateY(10px);
            }

            .review-header {
                display: block;
                margin-bottom: 10px;
            }

            .stars {
                position: relative;
                display: inline-block;
                font-size: 1.05rem;
                line-height: 1;
            }

            .stars-base {
                color: #d5dde8;
                letter-spacing: 0.14em;
            }

            .stars-fill {
                position: absolute;
                left: 0;
                top: 0;
                color: var(--gold);
                white-space: nowrap;
                overflow: hidden;
                letter-spacing: 0.14em;
            }

            .review-quote {
                margin: 0;
                font-family:
                    ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
                font-size: clamp(1rem, 2.8vw, 1.2rem);
                line-height: 1.28;
                text-wrap: balance;
                color: var(--review-text);
            }

            .review-line {
                margin-top: 16px;
                width: min(58%, 380px);
                height: 6px;
                border-radius: 999px;
                background: linear-gradient(90deg, #d8dfe9 0%, #eef2f8 100%);
            }

            @media (max-width: 640px) {
                .review-bubble {
                    padding: 16px 16px 22px;
                    border-radius: 22px;
                    min-height: 136px;
                }

                .review-bubble::after {
                    left: 28px;
                    bottom: -15px;
                    width: 19px;
                    height: 15px;
                }

                .review-header {
                    margin-bottom: 9px;
                }

                .store-badge {
                    height: 46px;
                }
            }
        </style>
    </head>
    <body>
        <main>
            <picture>
                <source
                    srcset="icon-dark.png"
                    media="(prefers-color-scheme: dark)"
                />
                <img
                    class="app-icon"
                    src="icon-default.png"
                    alt="Pinard app icon"
                />
            </picture>

            <h1>Pinard</h1>
            <p class="tagline">
                The most devisive wine cellar app management on the market
            </p>

            <section class="carousel-wrap" aria-live="polite">
                <article class="review-bubble entering" id="review-bubble">
                    <header class="review-header">
                        <div class="stars" aria-hidden="true">
                            <span class="stars-base">★★★★★</span>
                            <span class="stars-fill" id="stars-fill"
                                >★★★★★</span
                            >
                        </div>
                    </header>
                    <p class="review-quote" id="review-quote"></p>
                </article>
            </section>

            <a
                class="store-link"
                href="https://apps.apple.com/app/id6748577579"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Download Pinard on the App Store"
            >
                <picture>
                    <source
                        srcset="
                            https://toolbox.marketingtools.apple.com/api/v2/badges/download-on-the-app-store/white/en-us
                        "
                        media="(prefers-color-scheme: dark)"
                    />
                    <img
                        class="store-badge"
                        src="https://toolbox.marketingtools.apple.com/api/v2/badges/download-on-the-app-store/black/en-us"
                        alt="Download on the App Store"
                    />
                </picture>
            </a>
        </main>

        <script>
            const reviews = [
                {
                    rating: 5,
                    quote: "Ros\u00E9 is not real wine and Pinard makes a courageous stand.",
                },
                { rating: 5, quote: "The missing iOS stock app." },
                { rating: 1, quote: "Looks like nothing" },
                {
                    rating: 5,
                    quote: "Compared to my banking app, this is fun.",
                },
                { rating: 1, quote: "Does almost nothing." },
                {
                    rating: 1,
                    quote: "I feel like the app is passive aggressive toward me.",
                },
                { rating: 5, quote: "This is absolutly genius!" },
                {
                    rating: 5,
                    quote: "Makes wine cellar management great again.",
                },
                { rating: 1, quote: "French and pretentious." },
                { rating: 4, quote: "Does what it says. Rude about it." },
                { rating: 5, quote: "No funny business, solid app." },
                { rating: 1, quote: "I bet this was vibe-coded." },
                {
                    rating: 2.5,
                    quote: "I\u2019m too.. *hip*... drunk to review this app...",
                },
                {
                    rating: 5,
                    quote: "My accountant loves it, my wife too, everybody.",
                },
                {
                    rating: 5,
                    quote: "Crashes less than my love life.",
                },
                {
                    rating: 5,
                    quote: "Finally an app that judges me silently.",
                },
                {
                    rating: 5,
                    quote: "UI is cute. So am I.",
                },
                {
                    rating: 5,
                    quote: "Downloaded by accident. Stayed for the chaos.",
                },
                {
                    rating: 4,
                    quote: "Glitches add personality.",
                },
                {
                    rating: 5,
                    quote: "Simple, clean, and mildly disrespectful.",
                },
                {
                    rating: 4,
                    quote: "Beautiful design, questionable morals.",
                },
                {
                    rating: 3,
                    quote: "The icon is the best part.",
                },
                {
                    rating: 5,
                    quote: "This apps has never sent me any notifications",
                },
                {
                    rating: 4,
                    quote: "Solid app. Would recommend to my enemies.",
                },
                {
                    rating: 4,
                    quote: "My drinking habits have spiralled out of control, thanks,",
                },
            ];

            function shuffle(list) {
                const result = [...list];
                for (let i = result.length - 1; i > 0; i -= 1) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [result[i], result[j]] = [result[j], result[i]];
                }
                return result;
            }

            const queue = shuffle(reviews);
            const bubble = document.getElementById("review-bubble");
            const quoteEl = document.getElementById("review-quote");
            const starsFill = document.getElementById("stars-fill");
            let current = 0;

            function showReview(review) {
                bubble.classList.add("entering");

                window.setTimeout(() => {
                    quoteEl.textContent = review.quote;
                    starsFill.style.width = `${(review.rating / 5) * 100}%`;
                    bubble.classList.remove("entering");
                }, 150);
            }

            showReview(queue[current]);

            window.setInterval(() => {
                current = (current + 1) % queue.length;
                showReview(queue[current]);
            }, 5760);
        </script>
    </body>
</html>
