<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Pinard app</title>
        <style>
            :root {
                --page-bg: #ffffff;
                --ink: #1c2735;
                --muted: #5d6a79;
                --bubble: #fffbea;
                --review-text: #000000;
                --bubble-shadow: rgba(16, 36, 56, 0.23);
                --gold: #f2bb05;
            }

            @media (prefers-color-scheme: dark) {
                :root {
                    --page-bg: #000000;
                    --ink: #f3efe4;
                    --muted: #ddd5c2;
                    --bubble: #2e2a1b;
                    --review-text: #ffffff;
                }
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    "Helvetica Neue", Arial, sans-serif;
                background: var(--page-bg);
                color: var(--ink);
            }

            main {
                width: min(760px, 92vw);
                padding: 52px 20px 44px;
                text-align: center;
            }

            .app-icon {
                width: min(42vw, 240px);
                max-width: 240px;
                height: auto;
                display: block;
                margin: 0 auto;
                filter: drop-shadow(0 18px 24px rgba(15, 29, 45, 0.28));
            }

            h1 {
                margin: 22px 0 10px;
                font-size: clamp(2rem, 6vw, 3.25rem);
                letter-spacing: 0.02em;
            }

            .tagline {
                margin: 0;
                font-size: clamp(1rem, 2.8vw, 1.2rem);
                color: var(--muted);
            }

            .carousel-wrap {
                margin-top: 36px;
                display: flex;
                justify-content: center;
            }

            .review-bubble {
                position: relative;
                width: min(680px, 100%);
                min-height: 170px;
                border-radius: 34px;
                background: var(--bubble);
                box-shadow: 0 18px 34px -15px var(--bubble-shadow);
                padding: 24px 28px 34px;
                text-align: left;
                transition:
                    opacity 260ms ease,
                    transform 260ms ease;
            }

            .review-bubble::after {
                content: "";
                position: absolute;
                left: 56px;
                bottom: -22px;
                width: 28px;
                height: 22px;
                background: var(--bubble);
                clip-path: polygon(50% 100%, 0 0, 100% 0);
            }

            .review-bubble.entering {
                opacity: 0;
                transform: translateY(10px);
            }

            .review-header {
                display: block;
                margin-bottom: 14px;
            }

            .review-rating {
                margin: 0 0 8px;
                font-size: 0.9rem;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: var(--muted);
                font-weight: 700;
            }

            .stars {
                position: relative;
                display: inline-block;
                font-size: 1.25rem;
                line-height: 1;
            }

            .stars-base {
                color: #d5dde8;
                letter-spacing: 0.14em;
            }

            .stars-fill {
                position: absolute;
                left: 0;
                top: 0;
                color: var(--gold);
                white-space: nowrap;
                overflow: hidden;
                letter-spacing: 0.14em;
            }

            .review-quote {
                margin: 0;
                font-family:
                    ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
                font-size: clamp(1.35rem, 4.8vw, 1.8rem);
                line-height: 1.3;
                text-wrap: balance;
                color: var(--review-text);
            }

            .review-line {
                margin-top: 16px;
                width: min(58%, 380px);
                height: 6px;
                border-radius: 999px;
                background: linear-gradient(90deg, #d8dfe9 0%, #eef2f8 100%);
            }

            @media (max-width: 640px) {
                .review-bubble {
                    padding: 20px 20px 28px;
                    border-radius: 26px;
                    min-height: 160px;
                }

                .review-bubble::after {
                    left: 36px;
                    bottom: -18px;
                    width: 24px;
                    height: 18px;
                }

                .review-header {
                    margin-bottom: 12px;
                }
            }
        </style>
    </head>
    <body>
        <main>
            <picture>
                <source
                    srcset="icon-dark.png"
                    media="(prefers-color-scheme: dark)"
                />
                <img
                    class="app-icon"
                    src="icon-default.png"
                    alt="Pinard app icon"
                />
            </picture>

            <h1>Pinard</h1>
            <p class="tagline">
                The most devisive wine cellar app management on the market
            </p>

            <section class="carousel-wrap" aria-live="polite">
                <article class="review-bubble entering" id="review-bubble">
                    <header class="review-header">
                        <h2 class="review-rating" id="review-rating">
                            5 stars
                        </h2>
                        <div class="stars" aria-hidden="true">
                            <span class="stars-base">★★★★★</span>
                            <span class="stars-fill" id="stars-fill"
                                >★★★★★</span
                            >
                        </div>
                    </header>
                    <p class="review-quote" id="review-quote"></p>
                </article>
            </section>
        </main>

        <script>
            const reviews = [
                {
                    rating: 5,
                    quote: "Ros\u00E9 is not real wine and Pinard makes a courageous stand.",
                },
                { rating: 5, quote: "The missing iOS stock app." },
                { rating: 1, quote: "Looks like nothing" },
                {
                    rating: 5,
                    quote: "Compared to my banking app, this is fun.",
                },
                { rating: 1, quote: "Does almost nothing." },
                { rating: 5, quote: "This is absolutly genius!" },
                {
                    rating: 5,
                    quote: "Makes wine cellar management great again.",
                },
                { rating: 1, quote: "French and pretentious." },
                { rating: 5, quote: "No funny business, solid app." },
                { rating: 1, quote: "I bet this was vibe-coded." },
                {
                    rating: 2.5,
                    quote: "I\u2019m too.. *hip*... drunk to review this app...",
                },
                {
                    rating: 5,
                    quote: "My accountant loves it, my wife too, everybody.",
                },
            ];

            function shuffle(list) {
                const result = [...list];
                for (let i = result.length - 1; i > 0; i -= 1) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [result[i], result[j]] = [result[j], result[i]];
                }
                return result;
            }

            const queue = shuffle(reviews);
            const bubble = document.getElementById("review-bubble");
            const ratingEl = document.getElementById("review-rating");
            const quoteEl = document.getElementById("review-quote");
            const starsFill = document.getElementById("stars-fill");
            let current = 0;

            function showReview(review) {
                bubble.classList.add("entering");

                window.setTimeout(() => {
                    ratingEl.textContent = `${review.rating} stars`;
                    quoteEl.textContent = review.quote;
                    starsFill.style.width = `${(review.rating / 5) * 100}%`;
                    bubble.classList.remove("entering");
                }, 150);
            }

            showReview(queue[current]);

            window.setInterval(() => {
                current = (current + 1) % queue.length;
                showReview(queue[current]);
            }, 4320);
        </script>
    </body>
</html>
